name: 🚀 Publish Package

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: ⤵️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - name: 🔍 Check versions
        run: |
          node -v
          npm -v
          pnpm -v
      - name: ⬆️ Upgrade npm
        run: npm install -g npm@latest
      - name: 🚧 Install deps
        run: pnpm install --frozen-lockfile
      - name: 📦 Build
        run: pnpm run build
      - name: 🚀 Publish package
        run: npm publish --access publi
